name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional override, e.g. 0.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test and build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml
          python -m pip install -e ".[flows]"
          python -m pytest tests/ -q
          python -m pip wheel -w dist .

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/ifuri-*.whl

  app:
    needs: wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tag: linux-x86_64
            tk: true
          - os: windows-latest
            tag: windows-x86_64
            tk: false
          - os: macos-latest
            tag: macos-arm64
            tk: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Tk (Linux)
        if: matrix.tk
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build native app
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml pyinstaller
          python -m pip install -e ".[flows]"
          python -m pytest tests/ -q
          python scripts/build-platform.py --skip-install

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.tag }}
          path: |
            dist/ifuri-*-${{ matrix.tag }}.*
            dist/apps/**

  release:
    needs: [wheel, app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'ifuri-*.whl' -o -name 'ifuri-*.tar.gz' -o -name 'ifuri-*.zip' \) -exec cp {} release/ \;
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
