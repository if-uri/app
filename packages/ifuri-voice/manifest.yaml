id: ifuri-voice-pack
version: 1
scheme: voice
description: Voice planning — regex, flow catalog, llm:// on urisys-node.

uri_patterns:
  - pattern: voice://local/query/plan
    kind: query
    operation: plan
    query_type: voice.v1.PlanQuery
    result_type: voice.v1.PlanResult
    side_effects: false
    approval: not_required

handlers:
  python:
    plan: python://handlers.plan:plan
